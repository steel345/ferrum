name: Build & Release Ferrum

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build Electron EXE (no publish)
        run: npx electron-builder --win --x64
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: List release folder
        run: dir release /s /b
        shell: cmd

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ferrum ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## Ferrum ${{ github.ref_name }}

            ### Install
            - **Installer**: Download `Ferrum-Setup-*.exe` and run it
            - **Portable**: Download `Ferrum-*.exe` (no install needed)

            > Auto-update is built in — future versions will update silently.
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
